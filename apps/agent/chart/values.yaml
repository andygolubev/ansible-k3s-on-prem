replicaCount: 1

image:
  repository: localhost:5000/agent-chatbot
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

vllm:
  baseUrl: http://vllm.llm.svc.cluster.local:8000/v1
  model: Qwen2.5-7B-Instruct
  apiKey: EMPTY
  temperature: "0.2"

langfuse:
  host: ""
  publicKey: ""
  secretKey: ""

tracing:
  tempo:
    enabled: true
    serviceName: agent-chatbot
    endpoint: otel-collector.observability.svc.cluster.local:4317
    protocol: grpc
    insecure: "true"

resources: {}
