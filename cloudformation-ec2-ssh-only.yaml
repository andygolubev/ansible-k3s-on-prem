AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Ubuntu 26.04 AMD64 EC2 instance with public SSH access and
  security group traffic limited to SSH.

Parameters:
  SshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to connect to the instance over SSH.
    AllowedPattern: ^(([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2]))$
    ConstraintDescription: Must be an IPv4 CIDR block, for example 203.0.113.10/32.
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for the Ubuntu host.
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
  UbuntuAmiParameter:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/26.04/stable/current/amd64/hvm/ebs-gp3/ami-id
    Description: Public SSM parameter that resolves to the latest Ubuntu 26.04 AMD64 AMI ID.
  RootVolumeSize:
    Type: Number
    Default: 30
    MinValue: 8
    Description: Root EBS volume size in GiB.

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  InstanceKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub ${AWS::StackName}-ssh-key
      KeyType: rsa
      KeyFormat: pem
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ssh-key

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH inbound and SSH outbound only.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr
          Description: SSH from allowed source CIDR.
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH outbound only.
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ssh-only-sg

  UbuntuHost:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAmiParameter
      InstanceType: !Ref InstanceType
      KeyName: !Ref InstanceKeyPair
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ubuntu-2604

Outputs:
  InstanceId:
    Description: EC2 instance ID.
    Value: !Ref UbuntuHost
  PublicIp:
    Description: Public IPv4 address assigned to the instance.
    Value: !GetAtt UbuntuHost.PublicIp
  PublicDnsName:
    Description: Public DNS name assigned to the instance.
    Value: !GetAtt UbuntuHost.PublicDnsName
  KeyPairName:
    Description: EC2 key pair name.
    Value: !Ref InstanceKeyPair
  KeyPairId:
    Description: EC2 key pair ID.
    Value: !GetAtt InstanceKeyPair.KeyPairId
  PrivateKeySsmParameterPath:
    Description: SSM Parameter Store path containing the generated private key material.
    Value: !Sub
      - /ec2/keypair/${KeyPairId}
      - KeyPairId: !GetAtt InstanceKeyPair.KeyPairId
  PrivateKeyRetrievalCommand:
    Description: AWS CLI command to write the generated PEM private key to a local file.
    Value: !Sub
      - aws ssm get-parameter --region ${AWS::Region} --name /ec2/keypair/${KeyPairId} --with-decryption --query Parameter.Value --output text > ${AWS::StackName}.pem
      - KeyPairId: !GetAtt InstanceKeyPair.KeyPairId
  SshCommand:
    Description: SSH command after retrieving the private key and running chmod 400 on it.
    Value: !Sub ssh -i ${AWS::StackName}.pem ubuntu@${UbuntuHost.PublicDnsName}
