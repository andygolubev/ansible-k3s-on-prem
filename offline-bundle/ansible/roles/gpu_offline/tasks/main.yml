---
# ---------------------------------------------------------------------------
# Preflight: verify GPU payload artifacts exist
# ---------------------------------------------------------------------------
- name: Verify NVIDIA driver deb directory exists
  ansible.builtin.stat:
    path: "{{ gpu_driver_deb_dir }}"
  register: gpu_driver_deb_stat

- name: Fail when NVIDIA driver debs are missing
  ansible.builtin.fail:
    msg: "Missing NVIDIA driver .deb directory: {{ gpu_driver_deb_dir }}. Run scripts/download-all-artifacts.sh first."
  when: not gpu_driver_deb_stat.stat.exists

- name: Verify NVIDIA container toolkit deb directory exists
  ansible.builtin.stat:
    path: "{{ gpu_ctk_deb_dir }}"
  register: gpu_ctk_deb_stat

- name: Fail when NVIDIA container toolkit debs are missing
  ansible.builtin.fail:
    msg: "Missing NVIDIA container toolkit .deb directory: {{ gpu_ctk_deb_dir }}. Run scripts/download-all-artifacts.sh first."
  when: not gpu_ctk_deb_stat.stat.exists

- name: Verify device plugin image archive exists
  ansible.builtin.stat:
    path: "{{ gpu_device_plugin_image_archive }}"
  register: gpu_device_plugin_image_stat

- name: Fail when device plugin image archive is missing
  ansible.builtin.fail:
    msg: "Missing device plugin image archive: {{ gpu_device_plugin_image_archive }}. Run scripts/download-all-artifacts.sh first."
  when: not gpu_device_plugin_image_stat.stat.exists

- name: Verify device plugin manifest exists
  ansible.builtin.stat:
    path: "{{ gpu_device_plugin_manifest_src }}"
  register: gpu_device_plugin_manifest_stat

- name: Fail when device plugin manifest is missing
  ansible.builtin.fail:
    msg: "Missing device plugin manifest: {{ gpu_device_plugin_manifest_src }}. Run scripts/download-all-artifacts.sh first."
  when: not gpu_device_plugin_manifest_stat.stat.exists

- name: Verify CUDA validation image archive exists
  ansible.builtin.stat:
    path: "{{ gpu_cuda_validation_image_archive }}"
  register: gpu_cuda_validation_image_stat

- name: Fail when CUDA validation image archive is missing
  ansible.builtin.fail:
    msg: >-
      Missing CUDA validation image archive:
      {{ gpu_cuda_validation_image_archive }}. Run
      scripts/download-all-artifacts.sh first.
  when: not gpu_cuda_validation_image_stat.stat.exists

# ---------------------------------------------------------------------------
# NVMe instance store setup
# ---------------------------------------------------------------------------
- name: Check if NVMe instance store device exists
  ansible.builtin.stat:
    path: "{{ gpu_nvme_device }}"
  register: nvme_device_stat

- name: Detect an existing NVMe filesystem
  ansible.builtin.command:
    argv:
      - blkid
      - -o
      - value
      - -s
      - TYPE
      - "{{ gpu_nvme_device }}"
  register: nvme_filesystem_type
  failed_when: false
  changed_when: false
  when: nvme_device_stat.stat.exists

- name: Format uninitialized NVMe instance store
  ansible.builtin.command:
    argv:
      - mkfs.ext4
      - -F
      - "{{ gpu_nvme_device }}"
  when:
    - nvme_device_stat.stat.exists
    - nvme_filesystem_type.stdout | trim == ''
  changed_when: true

- name: Create NVMe mount point
  ansible.builtin.file:
    path: "{{ gpu_nvme_mount }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: nvme_device_stat.stat.exists

- name: Persist NVMe instance store mount
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^{{ gpu_nvme_device | regex_escape }}\\s+"
    line: "{{ gpu_nvme_device }} {{ gpu_nvme_mount }} ext4 defaults,nofail 0 2"
    owner: root
    group: root
    mode: "0644"
  when: nvme_device_stat.stat.exists

- name: Check if NVMe instance store is mounted
  ansible.builtin.command:
    argv:
      - mountpoint
      - -q
      - "{{ gpu_nvme_mount }}"
  register: nvme_mountpoint_check
  failed_when: false
  changed_when: false
  when: nvme_device_stat.stat.exists

- name: Mount NVMe instance store
  ansible.builtin.command:
    argv:
      - mount
      - "{{ gpu_nvme_mount }}"
  changed_when: true
  when:
    - nvme_device_stat.stat.exists
    - nvme_mountpoint_check.rc != 0

- name: Create NVMe model cache directory
  ansible.builtin.file:
    path: "{{ gpu_nvme_model_cache_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: nvme_device_stat.stat.exists

# ---------------------------------------------------------------------------
# NVIDIA driver: reuse an already-working driver, otherwise install from
# local .deb packages (no internet access).
#
# A host may already have the driver installed (e.g. from a previous run or a
# golden image). We probe with nvidia-smi: when it responds, the driver is
# functional and we skip installation entirely.
#
# When the driver is not functional, the usual culprit on EC2 Ubuntu images is
# the nouveau kernel module grabbing the GPU at boot before the nvidia modules
# can load. nouveau is a loadable module here (not built-in), so instead of
# rebooting we blacklist it, unload it, and load the nvidia modules in place.
# Only if that still does not bring nvidia-smi up do we install the local
# .deb packages (which build the nvidia DKMS modules for this kernel).
# ---------------------------------------------------------------------------
- name: Check whether the NVIDIA driver is already working
  ansible.builtin.command:
    argv:
      - nvidia-smi
      - --query-gpu=driver_version
      - --format=csv,noheader
  register: nvidia_driver_check
  failed_when: false
  changed_when: false

- name: Record whether the NVIDIA driver is functional
  ansible.builtin.set_fact:
    nvidia_driver_functional: >-
      {{ (nvidia_driver_check.rc == 0 and (nvidia_driver_check.stdout | trim | length > 0)) | bool }}

- name: Blacklist nouveau so the nvidia driver can claim the GPU
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      blacklist nouveau
      options nouveau modeset=0
  register: nouveau_blacklist
  when: not (nvidia_driver_functional | bool)

# Bake the nouveau blacklist into the initramfs so it survives reboots.
# Without this, nouveau may re-grab the GPU at the next boot.
- name: Refresh initramfs with the nouveau blacklist
  ansible.builtin.command:
    argv:
      - update-initramfs
      - -u
      - -k
      - all
  changed_when: true
  when:
    - not (nvidia_driver_functional | bool)
    - nouveau_blacklist is changed

# rmmod nouveau alone fails while a GPU PCI device is still bound to it. Unbind
# every NVIDIA GPU from the nouveau driver first, then remove the module. The PCI
# address is discovered dynamically so this is not hard-coded to one instance.
- name: Find NVIDIA GPU PCI addresses bound to the nouveau driver
  ansible.builtin.shell: |
    set -e
    base=/sys/bus/pci/drivers/nouveau
    if [ -d "$base" ]; then
      for link in "$base"/*:*:*.*; do
        [ -L "$link" ] || continue
        basename "$(readlink -f "$link")"
      done
    fi
  args:
    executable: /bin/bash
  register: nouveau_bound_gpus
  changed_when: false
  when: not (nvidia_driver_functional | bool)

- name: Unbind NVIDIA GPUs from the nouveau driver
  ansible.builtin.shell: |
    set -e
    echo "{{ item }}" > /sys/bus/pci/drivers/nouveau/unbind
  args:
    executable: /bin/bash
  loop: "{{ nouveau_bound_gpus.stdout_lines }}"
  changed_when: true
  when:
    - not (nvidia_driver_functional | bool)
    - nouveau_bound_gpus.stdout_lines | length > 0

- name: Unload the nouveau kernel module
  ansible.builtin.command:
    argv:
      - modprobe
      - -r
      - nouveau
  failed_when: false
  changed_when: true
  when: not (nvidia_driver_functional | bool)

- name: Load the nvidia kernel modules
  ansible.builtin.shell: |
    set -e
    # nvidia-drm may report "busy" if a display/DRM lock lingers after nouveau
    # left; compute (nvidia-smi, CUDA) does not need it, so tolerate failure.
    for m in nvidia nvidia-uvm nvidia-modeset nvidia-drm; do
      modprobe "$m" || true
    done
  args:
    executable: /bin/bash
  changed_when: true
  when: not (nvidia_driver_functional | bool)

- name: Recheck the NVIDIA driver after loading its modules
  ansible.builtin.command:
    argv:
      - nvidia-smi
      - --query-gpu=driver_version
      - --format=csv,noheader
  register: nvidia_driver_recheck
  failed_when: false
  changed_when: false
  when: not (nvidia_driver_functional | bool)

- name: Record whether driver package install is still needed
  ansible.builtin.set_fact:
    nvidia_driver_needs_install: >-
      {{ (not (nvidia_driver_functional | bool) and (nvidia_driver_recheck.rc | default(1) != 0)) | bool }}

- name: Find NVIDIA driver .deb packages
  ansible.builtin.find:
    paths: "{{ gpu_driver_deb_dir }}"
    patterns: "*.deb"
  register: driver_deb_files
  when: nvidia_driver_needs_install | bool

- name: Fail when no NVIDIA driver .deb files found
  ansible.builtin.fail:
    msg: "No .deb files found in {{ gpu_driver_deb_dir }}"
  when:
    - nvidia_driver_needs_install | bool
    - driver_deb_files.files | length == 0

- name: Find unsafe NVIDIA driver packages
  ansible.builtin.set_fact:
    unsafe_driver_deb_files: >-
      {{ driver_deb_files.files
         | map(attribute='path')
         | map('basename')
         | select('match', '^(nvidia-dkms-|linux-image-|linux-headers-|linux-(main-modules|modules|objects|signatures)-.*-(azure|azure-fde|gcp|generic|ibm|nvidia|oracle)(_|-))')
         | list }}
  when: nvidia_driver_needs_install | bool

- name: Reject driver payloads containing DKMS or non-AWS kernels
  ansible.builtin.fail:
    msg: >-
      Unsafe NVIDIA driver payload contains DKMS or non-AWS kernel packages:
      {{ unsafe_driver_deb_files | join(', ') }}. Rebuild the GPU artifacts.
  when:
    - nvidia_driver_needs_install | bool
    - unsafe_driver_deb_files | length > 0

- name: Install NVIDIA driver packages from local .deb files
  ansible.builtin.shell: |
    set -euo pipefail
    dpkg -i {{ gpu_driver_deb_dir }}/*.deb || apt-get install -f -y --no-download
  args:
    executable: /bin/bash
  environment:
    DEBIAN_FRONTEND: noninteractive
  changed_when: true
  when: nvidia_driver_needs_install | bool

- name: Load nvidia modules after driver package install
  ansible.builtin.shell: |
    set -e
    for m in nvidia nvidia-uvm nvidia-modeset nvidia-drm; do
      modprobe "$m" || true
    done
  args:
    executable: /bin/bash
  changed_when: true
  when: nvidia_driver_needs_install | bool

# ---------------------------------------------------------------------------
# Install NVIDIA container toolkit from local .deb packages
# ---------------------------------------------------------------------------
- name: Find NVIDIA container toolkit .deb packages
  ansible.builtin.find:
    paths: "{{ gpu_ctk_deb_dir }}"
    patterns: "*.deb"
  register: ctk_deb_files

- name: Fail when no NVIDIA container toolkit .deb files found
  ansible.builtin.fail:
    msg: "No .deb files found in {{ gpu_ctk_deb_dir }}"
  when: ctk_deb_files.files | length == 0

- name: Install NVIDIA container toolkit packages from local .deb files
  ansible.builtin.shell: |
    set -euo pipefail
    dpkg -i {{ gpu_ctk_deb_dir }}/*.deb || apt-get install -f -y --no-download
  args:
    executable: /bin/bash
  environment:
    DEBIAN_FRONTEND: noninteractive
  changed_when: true
  notify: Restart k3s

# ---------------------------------------------------------------------------
# Configure NVIDIA runtime for K3s containerd. K3s discovers supported runtime
# binaries on PATH and generates the complete containerd configuration. A
# partial config.toml.tmpl replaces (rather than merges with) that generated
# configuration and breaks K3s's CNI paths, so remove the legacy template.
# ---------------------------------------------------------------------------
- name: Verify NVIDIA container runtime is installed
  ansible.builtin.stat:
    path: /usr/bin/nvidia-container-runtime
  register: nvidia_container_runtime

- name: Fail when NVIDIA container runtime is missing
  ansible.builtin.fail:
    msg: >-
      /usr/bin/nvidia-container-runtime is missing after installing the local
      NVIDIA container toolkit packages.
  when: not nvidia_container_runtime.stat.executable

- name: Remove legacy partial K3s containerd template
  ansible.builtin.file:
    dest: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
    state: absent
  notify: Restart k3s

# Flush handlers so K3s regenerates its complete containerd config after it can
# discover nvidia-container-runtime on PATH.
- name: Flush handlers to regenerate K3s containerd configuration
  ansible.builtin.meta: flush_handlers

- name: Wait for the K3s API after restart
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - get
      - nodes
  register: k3s_nodes_after_restart
  changed_when: false
  retries: 20
  delay: 6
  until: k3s_nodes_after_restart.rc == 0

- name: Read effective containerd CRI configuration
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - crictl
      - info
  register: k3s_crictl_info
  changed_when: false

- name: Validate K3s CNI paths and runtime status
  ansible.builtin.assert:
    that:
      - k3s_cri_info.cniconfig.PluginConfDir == '/var/lib/rancher/k3s/agent/etc/cni/net.d'
      - k3s_cri_info.cniconfig.PluginDirs | select('match', '^/var/lib/rancher/k3s/data/(cni|[^/]+/bin)$') | list | length > 0
      - k3s_runtime_ready.status | bool
      - k3s_network_ready.status | bool
    fail_msg: >-
      K3s containerd has incorrect CNI paths or is not ready. Refusing to
      continue with GPU workloads. crictl info: {{ k3s_crictl_info.stdout }}
  vars:
    k3s_cri_info: "{{ k3s_crictl_info.stdout | from_json }}"
    k3s_runtime_ready: >-
      {{ k3s_cri_info.status.conditions
         | selectattr('type', 'equalto', 'RuntimeReady') | first }}
    k3s_network_ready: >-
      {{ k3s_cri_info.status.conditions
         | selectattr('type', 'equalto', 'NetworkReady') | first }}

- name: Wait for the K3s node and CNI to become Ready
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - wait
      - --for=condition=Ready
      - node
      - --all
      - --timeout=300s
  changed_when: false

- name: Verify the CNI bridge exists
  ansible.builtin.command:
    argv:
      - ip
      - link
      - show
      - cni0
  changed_when: false

- name: Verify K3s registered the NVIDIA RuntimeClass
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - get
      - runtimeclass
      - nvidia
  changed_when: false

# ---------------------------------------------------------------------------
# Load NVIDIA device plugin image into K3s/containerd
# ---------------------------------------------------------------------------
- name: Import NVIDIA device plugin image into K3s containerd
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - ctr
      - images
      - import
      - "{{ gpu_device_plugin_image_archive }}"
  changed_when: true

- name: Import CUDA validation image into K3s containerd
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - ctr
      - images
      - import
      - "{{ gpu_cuda_validation_image_archive }}"
  changed_when: true

# ---------------------------------------------------------------------------
# Apply NVIDIA device plugin manifest
# ---------------------------------------------------------------------------
- name: Copy device plugin manifest
  ansible.builtin.copy:
    src: "{{ gpu_device_plugin_manifest_src }}"
    dest: "{{ gpu_device_plugin_manifest_dest }}"
    owner: root
    group: root
    mode: "0644"

- name: Select the NVIDIA RuntimeClass for the device plugin
  ansible.builtin.lineinfile:
    path: "{{ gpu_device_plugin_manifest_dest }}"
    insertbefore: '^      priorityClassName:'
    line: '      runtimeClassName: nvidia'
    firstmatch: true
    state: present

- name: Apply NVIDIA device plugin manifest
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - apply
      - -f
      - "{{ gpu_device_plugin_manifest_dest }}"
  changed_when: "'created' in device_plugin_apply.stdout or 'configured' in device_plugin_apply.stdout"
  register: device_plugin_apply

- name: Wait for NVIDIA device plugin to be ready
  ansible.builtin.shell: |
    set -euo pipefail
    /usr/local/bin/k3s kubectl -n kube-system rollout status daemonset/nvidia-device-plugin-daemonset --timeout=120s
  args:
    executable: /bin/bash
  changed_when: false

# ---------------------------------------------------------------------------
# GPU validation
# ---------------------------------------------------------------------------
- name: Verify nvidia-smi works on host
  ansible.builtin.command:
    argv:
      - nvidia-smi
  changed_when: false
  register: host_nvidia_smi
  failed_when: host_nvidia_smi.rc != 0

- name: Show nvidia-smi output
  ansible.builtin.debug:
    msg: "{{ host_nvidia_smi.stdout_lines }}"

- name: Verify node advertises nvidia.com/gpu capacity
  ansible.builtin.shell: |
    /usr/local/bin/k3s kubectl get node -o jsonpath='{.items[0].status.allocatable.nvidia\.com/gpu}'
  args:
    executable: /bin/bash
  register: gpu_allocatable
  changed_when: false
  retries: "{{ gpu_validation_retries }}"
  delay: "{{ gpu_validation_delay }}"
  until: gpu_allocatable.stdout | trim | int >= 1

- name: Fail when GPU is not allocatable
  ansible.builtin.fail:
    msg: "Node does not advertise nvidia.com/gpu allocatable capacity. Got: {{ gpu_allocatable.stdout | trim }}"
  when: gpu_allocatable.stdout | trim | int < 1

- name: Check whether an existing vLLM deployment owns the single GPU
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - llm
      - get
      - deployment
      - vllm
      - -o
      - jsonpath={.spec.template.spec.containers[0].resources.limits.nvidia\.com/gpu}
  register: existing_vllm_gpu_claim
  failed_when: false
  changed_when: false

- name: Decide whether a standalone GPU validation pod is required
  ansible.builtin.set_fact:
    gpu_validation_pod_required: >-
      {{ existing_vllm_gpu_claim.rc != 0 or
         (existing_vllm_gpu_claim.stdout | default('0') | trim | int) < 1 }}

- name: Report existing GPU workload validation
  ansible.builtin.debug:
    msg: >-
      The existing vLLM deployment already claims the node's single GPU;
      skipping the standalone validation pod on this rerun.
  when: not (gpu_validation_pod_required | bool)

- name: Deploy GPU validation pod
  ansible.builtin.copy:
    dest: "{{ gpu_validation_pod_manifest_dest }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: gpu-validation
        namespace: kube-system
      spec:
        restartPolicy: Never
        runtimeClassName: nvidia
        containers:
          - name: nvidia-smi
            image: "{{ gpu_cuda_validation_image }}"
            imagePullPolicy: Never
            command: ["nvidia-smi"]
            resources:
              limits:
                nvidia.com/gpu: "1"
              requests:
                nvidia.com/gpu: "1"
  when: gpu_validation_pod_required | bool

- name: Apply GPU validation pod
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - apply
      - -f
      - "{{ gpu_validation_pod_manifest_dest }}"
  changed_when: true
  when: gpu_validation_pod_required | bool

- name: Wait for GPU validation pod to complete
  ansible.builtin.shell: |
    set -euo pipefail
    /usr/local/bin/k3s kubectl -n kube-system wait pod/gpu-validation \
      --for=condition=Ready=false \
      --timeout=300s
    phase=$(/usr/local/bin/k3s kubectl -n kube-system get pod/gpu-validation \
      -o jsonpath='{.status.phase}')
    if [[ "$phase" != "Succeeded" ]]; then
      echo "GPU validation pod phase: $phase" >&2
      /usr/local/bin/k3s kubectl -n kube-system logs gpu-validation || true
      exit 1
    fi
  args:
    executable: /bin/bash
  changed_when: false
  retries: "{{ gpu_validation_retries }}"
  delay: "{{ gpu_validation_delay }}"
  when: gpu_validation_pod_required | bool

- name: Show GPU validation pod logs
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - logs
      - gpu-validation
  changed_when: false
  register: gpu_validation_logs
  when: gpu_validation_pod_required | bool

- name: Display GPU validation result
  ansible.builtin.debug:
    msg: "{{ gpu_validation_logs.stdout_lines }}"
  when: gpu_validation_pod_required | bool

- name: Clean up GPU validation pod
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - delete
      - pod/gpu-validation
      - --ignore-not-found=true
  changed_when: true
  when: gpu_validation_pod_required | bool
