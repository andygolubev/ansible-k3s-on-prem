# Optional: apply this only when a Prometheus Operator stack is present.
# The vllm_offline role checks for the ServiceMonitor CRD before applying this.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm
  namespace: llm
  labels:
    app: vllm
    app.kubernetes.io/name: vllm
    app.kubernetes.io/managed-by: offline-bundle
spec:
  selector:
    matchLabels:
      app: vllm
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
